# ============================================================
# Render Infrastructure-as-Code
# Despliega: Backend (Web Service) + Frontend (Static Site)
# Documentación: https://render.com/docs/render-yaml
# ============================================================

services:

  # ── Backend: FastAPI API ─────────────────────────────────
  - type: web
    name: eno-portal-backend
    runtime: python
    region: oregon
    plan: free

    # Comandos de build e inicio (rutas relativas a la raíz del repo)
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && uvicorn main:app --host 0.0.0.0 --port $PORT

    # Variables de entorno requeridas en producción
    # Completa los valores "sync: false" en el Dashboard de Render
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: "postgres"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend: HTML Estático ──────────────────────────────
  - type: web
    name: eno-portal-frontend
    runtime: static
    region: oregon
    plan: free

    # Directorio del frontend
    staticPublishPath: frontend

    # Reglas de enrutamiento: redirige 404 a Index.html
    routes:
      - type: rewrite
        source: /*
        destination: /Index.html
